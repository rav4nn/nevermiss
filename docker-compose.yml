services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nevermiss
    volumes:
      - postgres_data:/var/lib/postgresql/data

  worker:
    image: nevermiss-worker
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file:
      - ./.env.example
      - ./backend/.env.example
    depends_on:
      - postgres

volumes:
  postgres_data:

